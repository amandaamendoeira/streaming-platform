<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <label for="theme-toggle" class="toggle-switch" aria-label="Alternar modo escuro/claro">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <ul class="profiles">
                <li class="profile">
                    <a href="#" class="profile-link">
                        <figure>
                            <img src="/assets/perfil-1.jpg" alt="Um personagem de aparência gótica e caricata, com cabelos roxos e monóculo, posa em um cenário fantástico de miniaturas sombrias iluminadas por velas.">
                            <figcaption>Gustavo</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile">
                    <a href="#" class="profile-link">
                        <figure>
                            <img src="/assets/perfil-2.jpg" alt="Imagem de um boné azul">
                            <figcaption>Marina</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile">
                    <a href="#" class="profile-link">
                        <figure>
                            <img src="/assets/perfil-3.jpg" alt="Uma personagem com cabelos castanhos e um sorriso amigável, vestindo uma blusa laranja">
                            <figcaption>Amanda</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile">
                    <a href="#" class="profile-link">
                        <figure>
                            <img src="/assets/perfil-4.jpg" alt="Imagem de um sapo verde com olhos grandes e expressão sorridente">
                            <figcaption>Thiago</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
